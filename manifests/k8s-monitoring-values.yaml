# ─────────────────────────────────────────────────────────────────────────────
# Grafana Kubernetes Monitoring — Helm values (chart v2)
# Chart: grafana/k8s-monitoring
#
# Uses a single OTLP destination — the same Grafana Cloud gateway as the
# OTel Demo Collector.  No separate Prometheus or Loki credentials needed.
#
# Do NOT run helm install against this file directly — use run.sh / setup.py.
# ─────────────────────────────────────────────────────────────────────────────

cluster:
  name: "otel-lab"

destinations:
  grafana-cloud:
    type: otlp
    url: "${GRAFANA_OTLP_ENDPOINT}"
    protocol: http
    auth:
      type: basic
      username: "${GRAFANA_INSTANCE_ID}"
      password: "${GRAFANA_API_TOKEN}"
    metrics: {enabled: true}
    logs:    {enabled: true}
    traces:  {enabled: false}

clusterMetrics:
  enabled: true
  collector: alloy-metrics

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: false

podLogsViaLoki:
  enabled: true
  collector: alloy-logs

clusterEvents:
  enabled: true

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]

telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
