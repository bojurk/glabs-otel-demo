# ─────────────────────────────────────────────────────────────────────────────
# OpenTelemetry Demo – Helm values
# Chart: open-telemetry/opentelemetry-demo
#
# What this does:
#   - Disables the in-cluster Jaeger and Grafana (we use Grafana Cloud instead)
#   - Keeps the built-in load generator running so there's always live traffic
#   - Reconfigures the OTel Collector to forward all signals to Grafana Cloud
#     via the OTLP HTTP gateway with basic auth
# ─────────────────────────────────────────────────────────────────────────────

# ── Disable in-cluster backends (replaced by Grafana Cloud) ──────────────────
jaeger:
  enabled: false

grafana:
  enabled: false

prometheus:
  server:
    enabled: false

# ── Keep load generator so the demo always has traffic ───────────────────────
loadgenerator:
  enabled: true

# ── OpenTelemetry Collector configuration ────────────────────────────────────
# The collector is the central hub: every demo service sends OTLP to it,
# and it forwards everything to Grafana Cloud.
opentelemetry-collector:
  # Pull Grafana credentials from the K8s Secret created by 02-prerequisites.sh
  extraEnvsFrom:
    - secretRef:
        name: grafana-credentials

  config:
    # ── Extensions ────────────────────────────────────────────────────────────
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      basicauth/grafana:
        client_auth:
          username: "${env:GRAFANA_INSTANCE_ID}"
          password: "${env:GRAFANA_API_TOKEN}"

    # ── Receivers ─────────────────────────────────────────────────────────────
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    # ── Processors ────────────────────────────────────────────────────────────
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      batch:
        timeout: 5s
        send_batch_size: 1000

    # ── Exporters ─────────────────────────────────────────────────────────────
    exporters:
      otlphttp/grafana:
        endpoint: "https://otlp-gateway-prod-us-east-0.grafana.net/otlp"
        auth:
          authenticator: basicauth/grafana
        # Retry on transient errors
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
      debug:
        verbosity: basic

    # ── Pipelines ─────────────────────────────────────────────────────────────
    service:
      extensions: [health_check, basicauth/grafana]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/grafana, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/grafana, debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/grafana, debug]
