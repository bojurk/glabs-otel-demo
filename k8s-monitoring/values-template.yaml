# ─────────────────────────────────────────────────────────────────────────────
# Grafana Kubernetes Monitoring – Helm values template
# Chart: grafana/k8s-monitoring
#
# What this does:
#   - Installs Grafana Alloy on every node to collect cluster metrics and logs
#   - Installs kube-state-metrics and node-exporter as metric sources
#   - Forwards metrics to your Grafana Cloud Prometheus (remote write)
#   - Forwards pod logs and cluster events to your Grafana Cloud Loki
#
# HOW TO USE:
#   This is a template. The ${...} placeholders are filled in by the install
#   script (05-install-k8s-monitoring.sh) using envsubst from your setup.env.
#   Do not run helm install against this file directly.
# ─────────────────────────────────────────────────────────────────────────────

cluster:
  name: "otel-lab"

# ── Where to send data ────────────────────────────────────────────────────────
externalServices:
  prometheus:
    host: "${GRAFANA_METRICS_HOST}"
    basicAuth:
      username: "${GRAFANA_METRICS_USERNAME}"
      password: "${GRAFANA_API_TOKEN}"

  loki:
    host: "${GRAFANA_LOGS_HOST}"
    basicAuth:
      username: "${GRAFANA_LOGS_USERNAME}"
      password: "${GRAFANA_API_TOKEN}"

# ── What to collect ───────────────────────────────────────────────────────────
metrics:
  enabled: true

logs:
  pod_logs:
    enabled: true
  cluster_events:
    enabled: true

# ── Features we don't need for a learning lab ─────────────────────────────────
traces:
  enabled: false   # Traces come from the OTel Demo, not from the cluster infra

opencost:
  enabled: false   # Cost tracking not needed for a personal lab

# ── Alloy sub-chart settings ──────────────────────────────────────────────────
alloy-metrics:
  enabled: true

alloy-logs:
  enabled: true

alloy-events:
  enabled: true

# Alloy profiles (continuous profiling) — off for simplicity
alloy-profiles:
  enabled: false
